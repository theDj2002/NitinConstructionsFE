<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>NKP Full Intro Animation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#020617;font-family:Arial,sans-serif}
#intro{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle,#111827,#020617);z-index:9999;animation:fadeOut 1.2s ease 6.5s forwards}
.logoWrap{position:relative;width:420px;height:420px;animation:zoomIn 1.4s ease forwards}
.logo{width:100%;height:100%;object-fit:contain;border-radius:50%;filter:drop-shadow(0 0 25px rgba(255,215,0,.45));animation:float 3s ease-in-out infinite}
.ring{position:absolute;inset:-18px;border-radius:50%;border:5px solid rgba(255,215,0,.8);animation:spin 10s linear infinite}
.ring2{position:absolute;inset:-36px;border-radius:50%;border:2px dashed rgba(255,255,255,.35);animation:spinRev 14s linear infinite}
.shine{position:absolute;top:-10%;left:-60%;width:40%;height:130%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);transform:rotate(25deg);animation:shine 2.8s linear infinite}
.text{position:absolute;bottom:-80px;width:100%;text-align:center;color:#f8fafc;letter-spacing:6px;font-size:18px;animation:pulse 1.8s infinite}
#site{height:100vh;display:flex;justify-content:center;align-items:center;color:white;font-size:42px}
@keyframes zoomIn{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes spinRev{from{transform:rotate(360deg)}to{transform:rotate(0)}}
@keyframes shine{0%{left:-60%}100%{left:140%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
</style>
</head>
<body>
<div id='intro'>
<div class='logoWrap'>
<div class='ring'></div>
<div class='ring2'></div>
<img class='logo' src='NKP-GOLDEN-IMAGE.png' alt='NKP Logo'>
<div class='shine'></div>
<div class='text'>WELCOME TO NKP CONSTRUCTIONS</div>
</div>
</div>
<div id='site'>Your Website Home Page</div>
</body>
</html>
